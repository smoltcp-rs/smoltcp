[package]
name = "smoltcp-fuzz"
version = "0.0.1"
authors = ["Automatically generated"]
publish = false
edition = "2018"

[package.metadata]
cargo-fuzz = true

[features]
log = ["dep:log", "smoltcp/log", "dep:env_logger"]

[dependencies]
libfuzzer-sys = "0.4"
arbitrary = { version = "1", features = ["derive"] }
getopts = "0.2"
smoltcp = { path = "..", default-features = false, features = [
    "std",
    "medium-ethernet", "medium-ieee802154",
    "proto-ipv4", "proto-dhcpv4", "proto-ipv6", "proto-sixlowpan",
    "socket-raw", "socket-icmp", "socket-udp", "socket-tcp", "socket-dhcpv4",
    "multicast",
]}

env_logger = { version = "0.9.0", optional = true }
log = { version = "0.4.14", optional = true }

# Prevent this from interfering with workspaces
[workspace]
members = ["."]

[[bin]]
name = "packet_parser"
path = "fuzz_targets/packet_parser.rs"
test = false
doc = false

[[bin]]
name = "iface"
path = "fuzz_targets/iface.rs"
test = false
doc = false

[[bin]]
name = "dhcp_header"
path = "fuzz_targets/dhcp_header.rs"
test = false
doc = false

[[bin]]
name = "ieee802154_header"
path = "fuzz_targets/ieee802154_header.rs"
test = false
doc = false

[[bin]]
name = "sixlowpan_packet"
path = "fuzz_targets/sixlowpan_packet.rs"
test = false
doc = false
